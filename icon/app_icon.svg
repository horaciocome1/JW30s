<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: forest green, darker at bottom -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <!-- Subtle inner shadow for depth -->
    <radialGradient id="shine" cx="0.4" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Sand gradient -->
    <linearGradient id="sandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="90" ry="90" fill="url(#bgGrad)"/>

  <!-- Subtle shine overlay -->
  <rect x="0" y="0" width="512" height="512" rx="90" ry="90" fill="url(#shine)"/>

  <!-- Hourglass - centered at 256, spanning from y=80 to y=432 -->
  <g transform="translate(256, 256)">
    <!-- Hourglass outer frame - top half (inverted triangle) -->
    <!-- Top plate -->
    <rect x="-100" y="-176" width="200" height="10" rx="3" fill="#FFFFFF"/>
    <!-- Bottom plate -->
    <rect x="-100" y="166" width="200" height="10" rx="3" fill="#FFFFFF"/>

    <!-- Hourglass glass body - two triangles meeting at center -->
    <!-- Top triangle (wide at top, narrow at center) -->
    <path d="M-82,-162 L82,-162 L14,-10 Q0,8 -14,-10 Z"
          fill="#FFFFFF" fill-opacity="0.25"
          stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>

    <!-- Bottom triangle (narrow at center, wide at bottom) -->
    <path d="M-14,10 Q0,-8 14,10 L82,162 L-82,162 Z"
          fill="#FFFFFF" fill-opacity="0.25"
          stroke="#FFFFFF" stroke-width="5" stroke-linejoin="round"/>

    <!-- Sand in top chamber - partial triangle showing sand remaining -->
    <path d="M-52,-162 L52,-162 L10,-80 Q0,-66 -10,-80 Z"
          fill="#FFFFFF" fill-opacity="0.55"/>

    <!-- Sand stream falling through neck -->
    <rect x="-2.5" y="-30" width="5" height="60" rx="2.5" fill="#FFFFFF" fill-opacity="0.6"/>

    <!-- Sand pile in bottom chamber -->
    <path d="M-60,162 L60,162 L14,60 Q0,44 -14,60 Z"
          fill="#FFFFFF" fill-opacity="0.55"/>

    <!-- Small decorative knobs on top plate -->
    <circle cx="-88" cy="-176" r="7" fill="#FFFFFF"/>
    <circle cx="88" cy="-176" r="7" fill="#FFFFFF"/>

    <!-- Small decorative knobs on bottom plate -->
    <circle cx="-88" cy="176" r="7" fill="#FFFFFF"/>
    <circle cx="88" cy="176" r="7" fill="#FFFFFF"/>
  </g>

  <!-- "30" text - bold, centered, overlaid on the hourglass -->
  <!-- Using a geometric/blocky style built from paths for "3" and "0" -->
  <g transform="translate(256, 268)" fill="#FFFFFF">
    <!-- Number "3" - left side, built from strokes -->
    <g transform="translate(-52, 0)">
      <!-- Top arc of 3 -->
      <path d="M-24,-34 L8,-34 Q24,-34 24,-20 Q24,-6 8,-6 L-4,-6"
            fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- Bottom arc of 3 -->
      <path d="M-4,6 L8,6 Q24,6 24,20 Q24,34 8,34 L-24,34"
            fill="none" stroke="#FFFFFF" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Number "0" - right side -->
    <g transform="translate(44, 0)">
      <rect x="-22" y="-34" width="44" height="68" rx="22" ry="22"
            fill="none" stroke="#FFFFFF" stroke-width="11"/>
    </g>
  </g>

  <!-- Subtle second-hand tick marks around - suggesting a clock/timer -->
  <g transform="translate(256, 256)" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.3">
    <!-- 12 o'clock -->
    <line x1="0" y1="-210" x2="0" y2="-198"/>
    <!-- 1 o'clock -->
    <line x1="53" y1="-203" x2="50" y2="-191"/>
    <!-- 2 o'clock -->
    <line x1="103" y1="-181" x2="97" y2="-170"/>
    <!-- 3 o'clock -->
    <line x1="210" y1="0" x2="198" y2="0"/>
    <!-- 4 o'clock -->
    <line x1="203" y1="53" x2="191" y2="50"/>
    <!-- 5 o'clock -->
    <line x1="181" y1="103" x2="170" y2="97"/>
    <!-- 6 o'clock -->
    <line x1="0" y1="210" x2="0" y2="198"/>
    <!-- 7 o'clock -->
    <line x1="-53" y1="203" x2="-50" y2="191"/>
    <!-- 8 o'clock -->
    <line x1="-103" y1="181" x2="-97" y2="170"/>
    <!-- 9 o'clock -->
    <line x1="-210" y1="0" x2="-198" y2="0"/>
    <!-- 10 o'clock -->
    <line x1="-203" y1="-53" x2="-191" y2="-50"/>
    <!-- 11 o'clock -->
    <line x1="-181" y1="-103" x2="-170" y2="-97"/>
  </g>
</svg>
